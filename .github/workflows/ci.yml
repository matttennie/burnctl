name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install .

      - name: Lint with flake8
        run: flake8 burnctl/ tests/

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify CLI entry points
        run: |
          burnctl --version
          python -m burnctl --version

      - name: Test graceful handling without agent data
        run: |
          burnctl --aider 2>&1 || true
          burnctl -j 2>&1 || true
          burnctl -c 2>&1 || true
          burnctl -A 2>&1 || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vermin
        run: pip install vermin

      - name: Check minimum Python version
        run: vermin --target=3.8 --backport argparse burnctl/ tests/
